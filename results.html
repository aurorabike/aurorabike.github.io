<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Inter", Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background: #fafafa;
            color: #333;
        }

        h2 {
            margin-top: 40px;
            border-left: 4px solid #555;
            padding-left: 10px;
        }

        img {
            display: block;
            width: 100%;
            max-width: 600px;
            border-radius: 6px;
            margin: 10px auto;
        }

        pre {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h2>Font</h2>
<p>Font is from <a href="https://fonts.google.com/specimen/Inter">Google Fonts</a>. Name: Inter</p>

<pre>
@font-face {
    font-family: Inter;
    src: url(sansation_light.woff) format("woff");
}

body {
    font-family: Inter;
}
</pre>

<h2>Validation</h2>
<img src="img/validator.png" alt="Validation Result">

<h2>Lighthouse</h2>
<img src="img/lighthouse.png" alt="Lighthouse Report">

<h2>Contrast</h2>
<img src="img/contrast.png" alt="Contrast Check">

</body>
</html>
